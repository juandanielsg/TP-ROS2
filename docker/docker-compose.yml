services:
  turtlebot4-sim:
    build:
      context: .
      dockerfile: Dockerfile
    image: turtlebot4-sim:humble
    container_name: turtlebot4-sim
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1           # prevents Gazebo/Qt rendering glitches
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw   # X11 socket for GUI (Gazebo, RViz2)
      - ..:/ros_ws                          # project root mounted as the ROS workspace
    network_mode: host                      # required for ROS2 DDS discovery (Linux only)
    devices:
      - /dev/dri:/dev/dri                   # GPU passthrough for hardware-accelerated Gazebo rendering
    stdin_open: true
    tty: true
